<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Admin – Le Morne Brabant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; }

/* LOGIN */
#loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: white; border-radius: 16px; padding: 48px 40px; width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); text-align: center; }
.login-card img { height: 56px; margin-bottom: 24px; }
.login-card h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.login-card p { color: #888; font-size: 0.82rem; margin-bottom: 28px; }
.login-card input { width: 100%; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; margin-bottom: 12px; transition: border 0.2s; }
.login-card input:focus { outline: none; border-color: #1a1a1a; }
.login-card button { width: 100%; padding: 13px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.login-card button:hover { background: #333; }
.login-error { color: #e53e3e; font-size: 0.82rem; margin-top: 8px; display: none; }

/* ADMIN PANEL */
#adminPanel { display: none; }
header { background: white; border-bottom: 3px solid #1a1a1a; padding: 14px 28px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
header img { height: 48px; }
.header-divider { width: 2px; height: 40px; background: #e0e0e0; }
.header-text h1 { font-size: 1rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
.header-text p { font-size: 0.75rem; color: #888; }
.header-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.btn-save { background: #1a1a1a; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
.btn-save:hover { background: #333; }
.btn-save:disabled { background: #999; cursor: not-allowed; }
.btn-logout { background: none; border: 1.5px solid #ddd; color: #666; padding: 8px 16px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; }
.btn-logout:hover { border-color: #999; }
.save-status { font-size: 0.82rem; font-weight: 600; }
.save-status.ok { color: #38a169; }
.save-status.err { color: #e53e3e; }

.container { max-width: 1100px; margin: 28px auto; padding: 0 20px; }

/* TABS */
.tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.tab-btn { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #ddd; background: white; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: #555; transition: all 0.2s; }
.tab-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }
.tab-btn.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }

/* SECTIONS */
.section { display: none; }
.section.active { display: block; }
.section-card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.section-card h2 { font-size: 0.78rem; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 18px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
.fields-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group label { font-size: 0.78rem; font-weight: 600; color: #555; }
.field-group input { padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 7px; font-size: 0.9rem; color: #1a1a1a; background: #fafafa; transition: border 0.2s; }
.field-group input:focus { outline: none; border-color: #1a1a1a; background: white; }
.field-group .suffix { font-size: 0.72rem; color: #aaa; margin-top: 2px; }

/* TOKEN SETTINGS */
.token-section { background: #fffbeb; border: 1.5px solid #f6e05e; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
.token-section h3 { font-size: 0.82rem; font-weight: 700; color: #744210; margin-bottom: 8px; }
.token-row { display: flex; gap: 10px; align-items: center; }
.token-row input { flex: 1; padding: 8px 12px; border: 1.5px solid #f6e05e; border-radius: 7px; font-size: 0.85rem; font-family: monospace; }
.token-row button { padding: 8px 16px; background: #744210; color: white; border: none; border-radius: 7px; font-size: 0.82rem; font-weight: 700; cursor: pointer; white-space: nowrap; }

@media(max-width:600px) { .fields-grid { grid-template-columns: 1fr 1fr; } }
</style>

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let configData = {};

// ─── LOGIN ────────────────────────────────────────────────────────────────────
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const hash = await sha256(pw);
  if (hash === PW_HASH) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    const token = localStorage.getItem('lm_gh_token') || '';
    if (token) document.getElementById('ghToken').value = token;
    await loadConfig();
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ─── TOKEN ────────────────────────────────────────────────────────────────────
function saveToken() {
  const t = document.getElementById('ghToken').value.trim();
  if (t) { localStorage.setItem('lm_gh_token', t); showStatus('Token guardado', true); }
}

// ─── RENDER ADMIN ─────────────────────────────────────────────────────────────
function buildUI() {
  const tabsEl = document.getElementById('tabs');
  const secEl  = document.getElementById('sectionsContainer');
  tabsEl.innerHTML = '';
  secEl.innerHTML  = '';

  SCHEMA.forEach((sec, i) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = sec.label;
    btn.onclick = () => switchTab(sec.id);
    tabsEl.appendChild(btn);

    // Section div
    const div = document.createElement('div');
    div.id = 'sec_' + sec.id;
    div.className = 'section' + (i === 0 ? ' active' : '');

    sec.groups.forEach(group => {
      const card = document.createElement('div');
      card.className = 'section-card';
      card.innerHTML = `<h2>${group.title}</h2>`;
      const grid = document.createElement('div');
      grid.className = 'fields-grid';
      group.fields.forEach(f => {
        const val = (configData[sec.id] || {})[f.key] ?? '';
        grid.innerHTML += `
          <div class="field-group">
            <label>${f.label}</label>
            <input type="number" step="0.01" id="f_${sec.id}_${f.key}" value="${val}">
            <span class="suffix">${f.unit}</span>
          </div>`;
      });
      card.appendChild(grid);
      div.appendChild(card);
    });
    secEl.appendChild(div);
  });
}

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', SCHEMA[i].id === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec_' + id));
}

// ─── LOAD CONFIG ─────────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const r = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${CONFIG_PATH}?t=${Date.now()}`);
    configData = await r.json();
  } catch(e) { configData = {}; }
  buildUI();
}

// ─── SAVE CONFIG ─────────────────────────────────────────────────────────────
function collectConfig() {
  const out = {};
  SCHEMA.forEach(sec => {
    out[sec.id] = {};
    sec.groups.forEach(group => {
      group.fields.forEach(f => {
        const el = document.getElementById(`f_${sec.id}_${f.key}`);
        if (el) out[sec.id][f.key] = parseFloat(el.value) || 0;
      });
    });
  });
  return out;
}

async function saveConfig() {
  const token = document.getElementById('ghToken').value.trim();
  if (!token) { showStatus('Introduce el token de GitHub primero', false); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  showStatus('Guardando…', null);

  try {
    // Obtener SHA actual del archivo
    const metaRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONFIG_PATH}`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
    });
    const meta = await metaRes.json();
    const sha = meta.sha;

    // Subir nuevo contenido
    const newConfig = collectConfig();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newConfig, null, 2))));
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONFIG_PATH}`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Actualización de precios desde panel admin', content, sha })
    });
    if (res.ok) { showStatus('✓ Cambios guardados correctamente', true); configData = newConfig; }
    else { showStatus('Error al guardar. Comprueba el token.', false); }
  } catch(e) { showStatus('Error de conexión', false); }

  btn.disabled = false;
}

function showStatus(msg, ok) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className = 'save-status' + (ok === true ? ' ok' : ok === false ? ' err' : '');
  if (ok !== null) setTimeout(() => el.textContent = '', 4000);
}
