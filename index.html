// Calcula precio escalonado (tramos acumulativos)
function calcTramos(valor, tramos) {
  // tramos: [{hasta, pct, fijo}] — fijo se usa cuando no hay pct
  let total = 0;
  for (const t of tramos) {
    if (valor <= 0) break;
    if (t.fijo !== undefined) { total = t.fijo; break; }
    const base = t.hasta ? Math.min(valor, t.hasta - (t.desde || 0)) : valor;
    total += base * t.pct / 100;
    if (t.hasta) valor -= base;
  }
  return total;
}

function calcFamiliaOpts(base) {
  const checks = document.querySelectorAll('.fam_opt');
  if (!checks.length) return;
  const tipo = document.getElementById('fam_tipo').value;
  const b = base || (tipo === 'mutuo' ? 513.5 : 1293.5);
  let extras = 0;
  const lines = [{ label: 'Precio base', v: b }];
  checks.forEach(c => {
    if (c.checked) {
      extras += parseFloat(c.dataset.v);
      lines.push({ label: c.parentElement.querySelector('.item-label').textContent, v: parseFloat(c.dataset.v) });
    }
  });
  showResult(lines);
}

function calcGananciales() {
  const mod = document.querySelector('input[name="gan_mod"]:checked')?.value;
  const valor = parseFloat(document.getElementById('gan_valor')?.value) || 0;
  if (!mod) return;
  const base = mod === 'mutuo' ? cf('familia','gananciales_mutuo_base',513.5) : cf('familia','gananciales_cont_base',1293.5);
  const pct = mod === 'mutuo' ? cf('familia','gananciales_mutuo_pct',0.9)/100 : cf('familia','gananciales_cont_pct',2.5)/100;
  const pctLabel = mod === 'mutuo' ? cf('familia','gananciales_mutuo_pct',0.9)+'%' : cf('familia','gananciales_cont_pct',2.5)+'%';
  const pctVal = valor * pct;
  showResult([
    { label: 'Precio base', v: base },
    { label: `${pctLabel} s/ bienes (${fmt(valor)} €)`, v: pctVal },
  ]);
}

function calcMediacion() {

function calcCivil() {
  const tipo = document.getElementById('civ_tipo').value;
  const wrap = document.getElementById('civ_cuantia_wrap');
  if (!tipo) { hideResult(); return; }

  if (tipo === 'judicial') {
    wrap.classList.remove('hidden');
    const cuantia = parseFloat(document.getElementById('civ_cuantia')?.value) || 0;
    if (!cuantia) { hideResult(); return; }
    let honorarios = 0;
    const _min=cf('civil','minimo',200),_p1=cf('civil','pct_tramo1',4),_p2=cf('civil','pct_tramo2',3),_p3=cf('civil','pct_tramo3',2);
    if (cuantia <= 17999) honorarios = Math.max(cuantia * _p1/100, _min);
    else if (cuantia <= 50000) honorarios = Math.max(cuantia * _p2/100, _min);
    else honorarios = Math.max(cuantia * _p3/100, _min);
    const pct = cuantia <= 17999 ? _p1+'%' : cuantia <= 50000 ? _p2+'%' : _p3+'%';
    showResult([{ label: `Procedimiento judicial (${pct} s/ ${fmt(cuantia)} €)`, v: honorarios }]);
  } else {
    wrap.classList.add('hidden');
    const MAP = {
      reconvencion: [{ label: 'Reconvención', v: cf('civil','reconvencion_base',1103) }],

function calcHC() {
  const tipo = document.getElementById('hc_tipo').value;
  const wrap = document.getElementById('hc_cuantia_wrap');
  if (!tipo) { hideResult(); return; }
  wrap.classList.remove('hidden');
  const cuantia = parseFloat(document.getElementById('hc_cuantia')?.value) || 0;
  if (!cuantia) { hideResult(); return; }

  // Tramos herencia contenciosa
  const tramosImp = [
    { hasta: 10000, fijo: 312 },
    { desde: 10000, hasta: 100000, pct: 2.0, base: 312 },
    { desde: 100000, hasta: 500000, pct: 1.25, base: 2112 },
    { desde: 500000, hasta: 1000000, pct: 1.0, base: 8712 },
    { desde: 1000000, hasta: 2000000, pct: 0.9, base: 16212 },
    { desde: 2000000, pct: 0.6, base: 28712 },
  ];
  const tramosDiv = [
    { hasta: 10000, fijo: 312 },
    { desde: 10000, hasta: 100000, pct: 2.1, base: 312 },
    { desde: 100000, hasta: 500000, pct: 1.35, base: 2112 },
    { desde: 500000, hasta: 1000000, pct: 1.05, base: 10112 },
    { desde: 1000000, hasta: 2000000, pct: 0.95, base: 17612 },
    { desde: 2000000, pct: 0.67, base: 30112 },
  ];

  const tramos = tipo === 'impugnacion' ? tramosImp : tramosDiv;
  const label = tipo === 'impugnacion' ? 'Impugnación de Testamento' : 'División Judicial de Herencia';
  let honorarios = 260; // mínimo
  for (const t of tramos) {
    if (t.fijo !== undefined && cuantia <= t.hasta) { honorarios = t.fijo; break; }
    if (!t.hasta || cuantia > t.hasta) continue; // no es el tramo
    if (cuantia > (t.desde || 0)) {
      const base = t.base || 0;
      const exceso = cuantia - (t.desde || 0);
      honorarios = Math.max(base + exceso * t.pct / 100, 260);
      break;
    }
  }
  // Tramo final (sin hasta)
  const ultimo = tramos[tramos.length - 1];
  if (cuantia > (ultimo.desde || 0)) {
    honorarios = Math.max((ultimo.base || 0) + (cuantia - ultimo.desde) * ultimo.pct / 100, 260);
  }
  showResult([{ label, v: Math.max(honorarios, 260) }]);
}

function calcHM() {

  wrap.classList.remove('hidden');
  const cuantia = parseFloat(document.getElementById('hm_cuantia')?.value) || 0;
  if (!cuantia) { hideResult(); return; }

  const TABLES = {
    con_testamento: [
      { hasta: 20000, fijo: 221 },
      { desde: 20000, hasta: 100000, pct: 0.60, base: 701 },
      { desde: 100000, hasta: 500000, pct: 1.5, base: 1301 },
      { desde: 500000, hasta: 1000000, pct: 2.5, base: 1701 },
      { desde: 1000000, hasta: 2000000, pct: 0.06, base: 2301 },
      { desde: 2000000, pct: 0.05 },
    ],
    sin_testamento_notarial: [
      { hasta: 20000, fijo: 221 },
      { desde: 20000, hasta: 100000, pct: 0.78, base: 845 },
      { desde: 100000, hasta: 500000, pct: 0.20, base: 1625 },
      { desde: 500000, hasta: 1000000, pct: 0.10, base: 2145 },
      { desde: 1000000, hasta: 2000000, pct: 0.08, base: 2925 },
      { desde: 2000000, pct: 0.07 },
    ],
    sin_testamento_judicial: [
      { hasta: 20000, fijo: 395 },
      { desde: 20000, hasta: 100000, pct: 1.80, base: 1835 },
      { desde: 100000, hasta: 500000, pct: 0.53, base: 3935 },
      { desde: 500000, hasta: 1000000, pct: 0.40, base: 5935 },
      { desde: 1000000, hasta: 2000000, pct: 0.33, base: 9235 },
      { desde: 2000000, pct: 0.28 },
    ],
  };
  const tramos = TABLES[tipo];
  let honorarios = 0;
  for (const t of tramos) {
    const desde = t.desde || 0;
    const hasta = t.hasta || Infinity;
    if (cuantia <= hasta) {
      if (t.fijo !== undefined) { honorarios = t.fijo; break; }
      honorarios = (t.base || 0) + (cuantia - desde) * t.pct / 100;
      break;
    }
  }
  showResult([{ label: document.getElementById('hm_tipo').selectedOptions[0].text, v: honorarios }]);
}

function calcEjecuciones() {
  const tipo = document.getElementById('eje_tipo').value;

    if (cuantia <= 18000) h = Math.max(cuantia * _ep1/100, _em);

function calcPenal() {
  const rol = document.getElementById('pen_rol').value;

  if (rol === 'denunciado') {
    const sel = document.querySelector('input[name="pen_den"]:checked')?.value;
    if (!sel) { hideResult(); return; }
    const pctWrap = document.getElementById('pen_den_pct_wrap');
    const BASE = { diligencias: cf('penal','den_diligencias',668), juicio: cf('penal','den_juicio',869), completo: cf('penal','den_completo',2431) };
    const base = BASE[sel];
    pctWrap.classList.remove('hidden');
    const cuantia = parseFloat(document.getElementById('pen_cuantia')?.value) || 0;
    const lines = [{ label: document.querySelector('input[name="pen_den"]:checked').closest('.check-item').querySelector('.item-label').textContent, v: base }];
    if (cuantia > 0 && sel !== 'completo') {
      const pct = cuantia <= 18000 ? cf('penal','den_pct_tramo1',4) : cuantia <= 50000 ? cf('penal','den_pct_tramo2',3) : cf('penal','den_pct_tramo3',2);
      lines.push({ label: `${pct}% éxito s/ ${fmt(cuantia)} €`, v: cuantia * pct / 100 });
    }
    showResult(lines);

  } else if (rol === 'denunciante') {
    const sel = document.querySelector('input[name="pen_dnte"]:checked')?.value;
    if (!sel) { hideResult(); return; }
    const BASE = { diligencias: cf('penal','dnte_diligencias',1215), juicio: cf('penal','dnte_juicio',1580), recurso_ap: cf('penal','dnte_recurso_ap',121) };
    let base = BASE[sel];
    const descuento = document.getElementById('pen_descuento')?.checked;
    const lines = [{ label: document.querySelector('input[name="pen_dnte"]:checked').closest('.check-item').querySelector('.item-label').textContent, v: base }];
    if (descuento) { const dp=cf('penal','descuento_segundo',20); lines.push({ label: 'Descuento 2º presupuesto (−'+dp+'%)', v: -(base * dp/100) }); }
    showResult(lines);

  } else if (rol === 'fijo') {
    const v = parseFloat(document.getElementById('pen_fijo_tipo')?.value) || 0;
    const label = document.getElementById('pen_fijo_tipo')?.selectedOptions[0]?.text;
    if (!v) { hideResult(); return; }
    showResult([{ label, v }]);
  }
}

// ─── DISPLAY ─────────────────────────────────────────────────────────────────

function fmt(n) {
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function showResult(lines) {
  if (!lines || !lines.length) { hideResult(); return; }
  const box = document.getElementById('resultBox');
  box.style.display = 'block';
  const total = lines.reduce((s, l) => s + (l.v || 0), 0);
  const iva = total * 0.21;
  document.getElementById('resTotal').textContent = fmt(total) + ' €';
  document.getElementById('resIva').textContent = `+ IVA (21%): ${fmt(iva)} € → Total con IVA: ${fmt(total + iva)} €`;
  const bd = document.getElementById('resBreakdown');
  if (lines.length > 1) {
    bd.innerHTML = lines.map(l => `<div class="breakdown-line"><span>${l.label}</span><span>${fmt(l.v)} €</span></div>`).join('')
      + `<div class="breakdown-line total-line"><span>TOTAL (sin IVA)</span><span>${fmt(total)} €</span></div>`;
  } else {
    bd.innerHTML = '';
  }
}

function hideResult() {
  document.getElementById('resultBox').style.display = 'none';
}

function resetCalc() {
  document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('servicePanel').style.display = 'none';
  hideResult();
}

// ─── ÁREA BUTTONS ─────────────────────────────────────────────────────────────

function initAreas() {
  const container = document.getElementById('areaBtns');
  AREAS.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'area-btn';
    btn.textContent = a.label;
    btn.onclick = () => selectArea(a);
    container.appendChild(btn);
  });
}

function selectArea(area) {
  document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  hideResult();
  const panel = document.getElementById('servicePanel');
  panel.style.display = 'block';
  document.getElementById('serviceTitle').textContent = area.label;
  const renderer = RENDERERS[area.id];
  document.getElementById('serviceContent').innerHTML = renderer ? renderer() : '<p>Área en configuración.</p>';
  // Auto-trigger para franquicia
  if (area.id === 'franquicia') calcFranquicia();
}

loadConfig().then(initAreas);
